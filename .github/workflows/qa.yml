name: QA

on:
- push
- pull_request

jobs:
  generate:
    name: "${{ github.event_name }} / generate"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - uses: DeterminateSystems/nix-installer-action@main

    - run: go generate
      shell: nix develop -c bash -e {0}

    - name: Git dirty check
      run: |
        git add .
        if [[ -n "$(git status --porcelain)" ]]; then
          PAGER= git diff --cached
          exit 1
        fi

  lint:
    name: "${{ github.event_name }} / lint"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - uses: DeterminateSystems/nix-installer-action@main
    - uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Run goimports
      run: goimports -w .
      shell: nix develop -c bash -e {0}

    - name: Git dirty check
      run: |
        git add .
        if [[ -n "$(git status --porcelain)" ]]; then
          PAGER= git diff --cached
          exit 1
        fi

  test:
    name: "${{ github.event_name }} / test"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - uses: DeterminateSystems/nix-installer-action@main
    - uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Setup Go build cache
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: go-build-nix-${{ github.run_id }}
        restore-keys: |
          go-build-nix-
          go-build-

    - run: go test ./...
      shell: nix develop -c bash -e {0}

    - run: cd pkg && go test ./...
      shell: nix develop -c bash -e {0}

    # Race-test the concurrent registry primitives (slab + gbox) by running their
    # parallel benchmarks under -race. Scoped to slab/gbox on purpose: a blanket
    # -race ./core/... trips checkptr inside the third-party KarpelesLab/weak
    # dependency (reached via intern's toggle-ref path), which is unrelated to our
    # own concurrency. -benchtime=10x keeps it fast and deterministic.
    - run: cd pkg && go test -race -run='^$' -bench=Parallel -benchtime=10x ./core/slab/ ./core/gbox/
      shell: nix develop -c bash -e {0}

  docker:
    name: "${{ github.event_name }} / docker"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - uses: docker/setup-buildx-action@v2

    - name: Setup Go build cache
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: go-build-docker-${{ github.run_id }}
        restore-keys: |
          go-build-docker-
          go-build-
    - run: mkdir -p ~/.cache/go-build

    # Check that the instructions for using Docker in CONTRIBUTING.md work.

    # Use docker/build-push-action@v4 instead of plain `docker build` to get caching.
    - name: docker build -t gotk4 .
      uses: docker/build-push-action@v4
      with:
        # Build but don't push
        load: true
        push: false
        # Caching
        cache-from: type=gha
        cache-to: type=gha,mode=max
        # Normal `docker build` arguments
        tags: gotk4
        #context: . # commented out to use Git directly instead of the filesystem

    - run: |
        docker run \
          --rm \
          --volume "$PWD:/gotk4/" \
          -u "$(id -u):$(id -g)" \
          gotk4 \
          go generate

    - name: Git dirty check
      run: |
        git add .
        if [[ -n "$(git status --porcelain)" ]]; then
          PAGER= git diff --cached
          exit 1
        fi

    # Also add extra `--volume "$HOME/.cache/go-build:/user/.cache/go-build"`
    # arguments to do caching.
    - run: |
        docker run \
          --rm \
          --volume "$PWD:/gotk4/" \
          --volume "$HOME/.cache/go-build:/user/.cache/go-build" \
          -u "$(id -u):$(id -g)" \
          gotk4 \
          bash -c "cd pkg && go test ./..."
